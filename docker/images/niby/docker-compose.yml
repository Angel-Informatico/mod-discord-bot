version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: niby-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - niby-network

  niby-bot:
    image: niby-discord-bot:latest
    container_name: niby-discord-bot
    build:
      context: ../../../
      dockerfile: docker/images/niby/Dockerfile
      args:
        NODE_ENV: production
    env_file:
      - ../../../.env
    environment:
      - REDIS_URL=redis:6379
      - CACHE_DB=true
      - PORT=3000
      - DASHBOARD=true
      - WEB_DOMAIN=localhost
      - SHARDING_MODE=process
      - TOTAL_SHARDS=0
      - SHARDS_PER_CLUSTER=0
      - PREFIX=,
      - DEFAULT_COLOR=#FFFFFF
      - COOLDOWN_COLOR=#ff9d00
      - ERROR_COLOR=#FF0000
      - LANGUAGE=EnglishUS
      - VERSION=1.0.0
      - PRETTY_LOGGER=true
      - SAVE_LOGS=true
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    volumes:
      - niby_logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - niby-network
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp

volumes:
  redis_data:
    driver: local
  niby_logs:
    driver: local

networks:
  niby-network:
    driver: bridge
